{% load static %}

<div class="slider movie-items">
	<div class="container">
		<div class="row">
			<div class="social-link">
				<p>Follow us: </p>
				<!-- DB -->

				{% for link in social_links %}
				<a href="{{ link.url }}">
					<i class="{{ link.icon_class }}"></i>
				</a>
				{% endfor %}

				
			</div>
	    	<div  class="slick-multiItemSlider">
				<!--  DB  -->

				{% for slider in sliders %}
				<div class="movie-item">
					<div class="mv-img">
						<a href="{{ slider.anchor_url  }}">
							<img src="{% static slider.image_src %}" width="{{ slider.img_width }}" height="{{ slider.img_height }}">
						</a>
					</div>
					<div class="title-in">
						<div class="cate">
							<span class="blue">
								<a href="#">{{ slider.movie_genre }}</a>
							</span>
						</div>
						<h6><a href="#">{{ slider.movie_title }}</a></h6>
						<p>
							<i class="ion-android-star"></i>
							<span>{{ slider.lower_rating }}</span> {{ slider.upper_rating }}
						</p>
					</div>
				</div>
				{% endfor %}

	    	</div>
	    </div>
	</div>
</div>
