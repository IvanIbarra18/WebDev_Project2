{% load static %}

<div class="trailers">
	<div class="container">
		<div class="row ipad-width">
			<div class="col-md-12">
				<div class="title-hd">
					<h2>in theater</h2>
					<a href="#" class="viewall">View all <i class="ion-ios-arrow-right"></i></a>
				</div>
				
				<div class="videos">
				 	<div class="slider-for-2 video-ft">
						{% for trailer, item in trailer_pairs %}
				 		<div>
					    	<iframe class="item-video" src="#" data-src="{{ trailer.trailer_URL }}"></iframe>
					    </div>
						{% empty %}
				 		<div>
					    	<iframe class="item-video" src="#" data-src="https://www.youtube.com/embed/1Q8fG0TtVAY"></iframe>
					    </div>
						{% endfor %}
					</div>
					<div class="slider-nav-2 thumb-ft">
						{% for trailer, item in trailer_pairs %}
						<div class="item">
							<div class="trailer-img">
								<img src="{% static item.img_src %}" alt="{{ item.img_alt }}" width="{{ item.img_width }}" height="{{ item.img_height }}">
							</div>
							<div class="trailer-infor">
	                        	<h4 class="desc">{{ item.description }}</h4>
	                        	<p>{{ item.duration }}</p>
	                        </div>
						</div>
						{% empty %}
						<div class="item">
							<div class="trailer-img">
								<img src="{% static 'app1/images/uploads/trailer7.jpg' %}" alt="trailer thumbnail" width="350" height="200">
							</div>
							<div class="trailer-infor">
	                        	<h4 class="desc">Wonder Woman</h4>
	                        	<p>2:30</p>
	                        </div>
						</div>
						{% endfor %}
					</div>
				</div>   
			</div>
		</div>
	</div>
</div>
